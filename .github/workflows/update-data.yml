name: Actualizar datos de Bilbao Kirolak

on:
  schedule:
    # Se ejecuta todos los lunes a las 4:00 AM (hora UTC)
    - cron: '0 4 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de actualización
        run: python get_bk_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/static/data.json
          git diff --cached --quiet || git commit -m "chore: actualizar data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push